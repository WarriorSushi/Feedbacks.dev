name: Process Webhook Jobs

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: process-webhook-jobs
  cancel-in-progress: false

jobs:
  process:
    name: Process queued webhook retries
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check cron secret
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not configured for this repository."
            exit 1
          fi

      - name: Process webhook jobs
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --silent --show-error \
            --max-time 55 \
            --retry 2 \
            --retry-delay 5 \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            https://app.feedbacks.dev/api/cron/webhook-jobs
